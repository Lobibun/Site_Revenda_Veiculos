<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login | Sistema</title>
        
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

        <link rel="stylesheet" href="/css/pages/login.css" />
        <link rel="stylesheet" href="/css/base/global.css" />
        <link rel="icon" type="image/png" href="Img/favicon.png">
        <script src="/js/components/header.js" defer></script>
    </head>
    <body>
        <main class="login-page">
            <form id="login-form" class="login-box">
                <header>
                    <h2>Login</h2>
                </header>

                <article id="erro-box" class="erro-box" style="display: none"></article>

                <article class="campo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required />
                </article>

                <article class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required />
                </article>

                <button type="submit" id="btn-login">Entrar no Sistema</button>
                
                <p class="container-esqueceu">
                    <a href="#" id="link-esqueceu">Esqueceu a senha?</a>
                </p>
            </form>

            <section id="modal-recuperar" class="modal-overlay">
                <article class="login-box modal-box">
                    <header>
                        <h3>Recuperar Senha</h3>
                        <p class="subtitulo">Enviaremos um link para o seu e-mail cadastrado.</p>
                    </header>
                    
                    <form id="form-recuperar">
                        <article class="campo">
                            <label for="email-recuperacao">Seu e-mail</label>
                            <input type="email" id="email-recuperacao" required placeholder="Digite seu e-mail" />
                        </article>
                        
                        <section class="botoes-modal">
                            <button type="button" id="btn-cancelar-recuperar" class="btn-secundario">Cancelar</button>
                            <button type="submit" id="btn-enviar-recuperar">Enviar Link</button>
                        </section>
                    </form>
                </article>
            </section>
        </main>

        <script src="/js/login.js" defer></script>
    </body>
</html>
