<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Contato | Revendedora</title>
        
        <link rel="stylesheet" href="css/base/global.css" />
        <link rel="stylesheet" href="css/components/header-footer.css" />
        <link rel="stylesheet" href="css/pages/contato.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
        
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        
        <script src="js/components/header.js" defer></script>
        <script src="js/contato.js" defer></script>
    </head>
    <body>
        <cabecalho-site></cabecalho-site>
        
        <main>
            <h1 class="titulo-secao">Contato</h1>

            <section class="contato-layout">
                <section class="contato-container">
                    <article class="contato-item">
                        <header>
                            <span class="icone-circulo"><i class="fas fa-map-marker-alt"></i></span>
                            <h2>Endereço</h2>
                        </header>
                        <address>
                            Rua das Flores, 123<br />
                            Centro, Florianópolis - SC<br />
                            CEP: 88000-000
                        </address>
                    </article>

                    <article class="contato-item">
                        <header>
                            <span class="icone-circulo"><i class="fas fa-phone"></i></span>
                            <h2>Telefone</h2>
                        </header>
                        <p>(48) 99999-9999</p>
                    </article>

                    <article class="contato-item">
                        <header>
                            <span class="icone-circulo"><i class="fas fa-envelope"></i></span>
                            <h2>E-mail</h2>
                        </header>
                        <p>contato@revendedora.com.br</p>
                    </article>
                </section>

                <section class="formulario-contato">
                    <form id="form-contato">
                        <article class="campo">
                            <label for="nome">Nome Completo</label>
                            <input type="text" id="nome" required />
                        </article>

                        <article class="campo">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" required />
                        </article>

                        <article class="campo">
                            <label for="mensagem">Sua Mensagem</label>
                            <textarea id="mensagem" rows="5" required></textarea>
                        </article>

                        <button type="submit" id="btn-enviar">Enviar Mensagem</button>
                    </form>
                </section>
            </section>

            <section class="mapa">
                <h2 class="titulo-secao">Nossa Localização</h2>
                <article class="mapa-container">
                    <iframe src="https://maps.google.com/maps?q=Florianopolis&t=&z=13&ie=UTF8&iwloc=&output=embed" width="100%" height="400" style="border: 0" allowfullscreen="" loading="lazy"></iframe>
                </article>
            </section>
        </main>

        <footer>
            <p>© 2026 Revendedora - Todos os direitos reservados</p>
        </footer>
    </body>
</html>
